<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Mensaje - VoidWhisper</title>
    <style>
        body { font-family: 'Georgia', serif; background: linear-gradient(135deg, #4B0082, #FFD700); color: #FFD700; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: auto; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; box-shadow: 0 0 20px #FFD700; }
        h1 { text-align: center; color: #FFD700; text-shadow: 0 0 10px #4B0082; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #FFD700; border-radius: 5px; background: #4B0082; color: #FFD700; }
        button { padding: 12px; background: #FFD700; color: #4B0082; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #FFA500; }
        .note { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; border: 1px solid #FFD700; }
        a { color: #FFD700; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Editar Mensaje</h1>
        <div class="note">
            <p><strong>Chat:</strong> {{ chat.name }}</p>
            <p><strong>Mensaje actual:</strong></p>
            <p>{{ message.content }}</p>
        </div>
        <form method="POST">
            <label for="content">Texto del mensaje</label>
            <textarea id="content" name="content" rows="6" required>{{ message.content }}</textarea>

            <label for="message_format">Formato</label>
            <select id="message_format" name="message_format">
                <option value="normal" {% if message.format == 'normal' %}selected{% endif %}>Normal</option>
                <option value="action" {% if message.format == 'action' %}selected{% endif %}>*Acción*</option>
                <option value="whisper" {% if message.format == 'whisper' %}selected{% endif %}>_Susurro_</option>
            </select>

            <button type="submit">Guardar</button>
        </form>
        <br>
        <a href="{{ url_for('chat_view', chat_id=chat.id) }}">← Volver al chat</a>
    </div>
</body>
</html>
