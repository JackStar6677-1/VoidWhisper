{% extends "base.html" %}
{% block content %}
<h1>Editar Mensaje</h1>
        <div class="note">
            <p><strong>Chat:</strong> {{ chat.name }}</p>
            <p><strong>Mensaje actual:</strong></p>
            <p>{{ message.content }}</p>
        </div>
        <form method="POST">
            <label for="content">Texto del mensaje</label>
            <textarea id="content" name="content" rows="6" required>{{ message.content }}</textarea>

            <label for="message_format">Formato</label>
            <select id="message_format" name="message_format">
                <option value="normal" {% if message.format == 'normal' %}selected{% endif %}>Normal</option>
                <option value="action" {% if message.format == 'action' %}selected{% endif %}>*Acción*</option>
                <option value="whisper" {% if message.format == 'whisper' %}selected{% endif %}>_Susurro_</option>
            </select>

            <button type="submit">Guardar</button>
        </form>
        <br>
        <a href="{{ url_for('chat_view', chat_id=chat.id) }}">← Volver al chat</a>
{% endblock %}
