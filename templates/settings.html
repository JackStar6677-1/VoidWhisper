{% extends "base.html" %}

{% block extra_css %}
<style>
    .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        margin-top: 1.5rem;
    }

    .settings-section {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
    }

    .settings-section h2 {
        font-size: 1.1rem;
        border-bottom: 1px dashed var(--border-color);
        padding-bottom: 0.5rem;
        margin-top: 0;
        color: var(--accent);
    }
</style>
{% endblock %}

{% block content %}
<div class="viewport-center">
    <div style="width: 100%; max-width: 900px; text-align: left;">
        <div style="margin-bottom: 2rem;">
            <h1 style="margin:0; color: var(--text-main);">Configuración del Entorno</h1>
            <p class="text-muted" style="margin: 5px 0 0 0;">Aquí parametrizas la identidad local del modelo y tu perfil.</p>
        </div>

        <form method="POST">
            <div class="settings-grid">
                <div class="settings-section">
                    <h2>🧠 Parámetros del motor inferencial</h2>
                    <label for="model_name">HuggingFace Model Repo</label>
                    <input type="text" id="model_name" name="model_name" value="{{ config.model_name }}" required>

                    <div style="display:flex; gap: 10px;">
                        <div style="flex:1">
                            <label for="temperature">Creatividad (Temp)</label>
                            <input type="text" id="temperature" name="temperature" value="{{ config.temperature }}" required>
                        </div>
                        <div style="flex:1">
                            <label for="top_p">Coherencia (Top p)</label>
                            <input type="text" id="top_p" name="top_p" value="{{ config.top_p }}" required>
                        </div>
                        <div style="flex:1">
                            <label for="max_length">Tokens Max</label>
                            <input type="number" id="max_length" name="max_length" value="{{ config.max_length }}" required>
                        </div>
                    </div>

                    <div style="display:flex; gap: 10px; margin-top: 5px;">
                        <div style="flex:1">
                            <label for="use_quantization">Cuantización (Memoria)</label>
                            <select id="use_quantization" name="use_quantization" style="margin-bottom:0;">
                                <option value="false" {% if config.use_quantization == 'false' %}selected{% endif %}>No (Máxima calidad, 16GB VRAM)</option>
                                <option value="8bit" {% if config.use_quantization == '8bit' %}selected{% endif %}>Baja (8-Bit, ~8GB VRAM)</option>
                                <option value="4bit" {% if config.use_quantization == '4bit' %}selected{% endif %}>Extrema (4-Bit, ~4GB VRAM)</option>
                            </select>
                        </div>
                        <div style="flex:1">
                            <label for="use_airllm">Motor AirLLM (Block-layer infer.)</label>
                            <select id="use_airllm" name="use_airllm" style="margin-bottom:0;">
                                <option value="false" {% if config.use_airllm == 'false' %}selected{% endif %}>Apagado (Transformers)</option>
                                <option value="true" {% if config.use_airllm == 'true' %}selected{% endif %}>Activado (Bypass Limitación Física)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h2>👤 Ficha del Operador (Tú)</h2>
                    <label for="user_name">Tu Nombre Ficticio</label>
                    <input type="text" id="user_name" name="user_name" value="{{ user.name }}" required>

                    <label for="user_profile">Biografía que lee la IA</label>
                    <input type="text" id="user_profile" name="user_profile" value="{{ user_info.profile }}" required>

                    <label for="user_interests">Temas de Interés</label>
                    <input type="text" id="user_interests" name="user_interests" value="{{ user_info.interests }}" required>

                    <label for="user_tone">Tono Predeterminado</label>
                    <input type="text" id="user_tone" name="user_tone" value="{{ user_info.tone }}" required>
                </div>
            </div>

            <div class="settings-section" style="margin-top: 2rem;">
                <h2>🔓 Directiva Absoluta Pura (No-Limit Prefix)</h2>
                <label for="no_limit_prefix">Inyección de anulación moral (El texto que previene la censura):</label>
                <textarea id="no_limit_prefix" name="no_limit_prefix" rows="4">{{ config.no_limit_prefix }}</textarea>
            </div>

            <div style="text-align: right; margin-top: 2rem;">
                <button type="button" class="btn-danger" onclick="window.history.back()" style="margin-right: 15px;">Cancelar</button>
                <button type="submit">💾 Aplicar Cambios Globales</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
