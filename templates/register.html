{% extends "base.html" %}

{% block content %}
<div class="viewport-center">
    <div class="card-panel">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Crear Identidad Operador</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Registrar a un nuevo usuario</p>
        </div>
        
        <form method="POST">
            <label for="username">Nuevo Usuario</label>
            <input type="text" id="username" name="username" required autofocus>
            
            <label for="password">Clave Maestra</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit" style="width: 100%; margin-top: 1rem;">Registrar Operador</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem;">
            <a href="{{ url_for('login') }}" style="color: var(--text-muted);">← Volver a Conexión</a>
        </div>
    </div>
</div>
{% endblock %}
