<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - VoidWhisper</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #2c1810, #1a0f0a); color: #e0c097; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.5); width: 300px; }
        h1 { text-align: center; color: #d4af37; }
        form { display: flex; flex-direction: column; }
        input { margin: 10px 0; padding: 10px; border: none; border-radius: 5px; }
        button { background: #d4af37; color: #2c1810; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #b8860b; }
        .flash { color: red; text-align: center; }
        a { color: #d4af37; text-decoration: none; text-align: center; display: block; margin-top: 10px; }

        /* Responsivo para móviles */
        @media (max-width: 768px) {
            .container { width: 90%; max-width: 300px; padding: 15px; }
            h1 { font-size: 1.8em; }
            input { padding: 12px; font-size: 16px; }
            button { padding: 12px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registro</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Registrar</button>
        </form>
        <a href="{{ url_for('login') }}">Iniciar Sesión</a>
    </div>
</body>
</html>
