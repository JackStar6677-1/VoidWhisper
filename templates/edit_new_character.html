<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Personaje desde Base - VoidWhisper</title>
    <style>
        body { font-family: 'Georgia', serif; background: linear-gradient(135deg, #4B0082, #FFD700); color: #FFD700; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: auto; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; box-shadow: 0 0 20px #FFD700; }
        h1 { text-align: center; color: #FFD700; text-shadow: 0 0 10px #4B0082; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 2px solid #FFD700; border-radius: 5px; background: #4B0082; color: #FFD700; }
        textarea { min-height: 300px; }
        button { padding: 12px; background: #FFD700; color: #4B0082; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #FFA500; }
        .note { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; border: 1px solid #FFD700; }
        a { color: #FFD700; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crear Personaje desde "{{ base_character.name }}"</h1>
        <div class="note">
            <p><strong>Base seleccionada:</strong> {{ base_character.name }}</p>
            <p>Edita el nombre y el prompt del sistema para crear un nuevo personaje basado en este. Puedes modificar cualquier aspecto: apariencia, personalidad, historia, etc.</p>
        </div>
        <form method="POST">
            <label for="name">Nombre del nuevo personaje</label>
            <input type="text" id="name" name="name" value="{{ base_character.name }} (Editado)" required>

            <label for="system_prompt">System Prompt (editado)</label>
            <textarea id="system_prompt" name="system_prompt" required>{{ base_character.system_prompt }}</textarea>

            <button type="submit">Crear Personaje</button>
        </form>
        <br>
        <a href="{{ url_for('index') }}">← Volver sin crear</a>
    </div>
</body>
</html>
